<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acoustic States — Background motion preview</title>
    <style>
      :root {
        --deep: #1f1516;
        --cream: #f3dec7;
        --peach: #e8c2aa;
        --clay: #b87e69;
        --blue: #0b5d7b;
        --white: #fff4e5;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100svh;
        margin: 0;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(ellipse at 15% 8%, rgba(232, 194, 170, .56), transparent 42%),
          radial-gradient(ellipse at 80% 18%, rgba(11, 93, 123, .42), transparent 31%),
          radial-gradient(ellipse at 52% 66%, rgba(184, 126, 105, .46), transparent 51%),
          var(--deep);
        color: var(--cream);
        font: 300 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -18vmax;
        z-index: 0;
        pointer-events: none;
        filter: blur(34px);
        will-change: transform, opacity;
      }

      body::before {
        background:
          radial-gradient(ellipse 25% 37% at 30% 35%, rgba(223, 175, 152, .14), rgba(223, 175, 152, .04) 46%, transparent 74%),
          radial-gradient(ellipse 18% 27% at 72% 62%, rgba(11, 93, 123, .13), rgba(11, 93, 123, .03) 50%, transparent 76%);
        animation: jellyfish-drift 34s ease-in-out infinite alternate;
      }

      body::after {
        background:
          radial-gradient(ellipse 22% 34% at 74% 25%, rgba(11, 93, 123, .14), rgba(11, 93, 123, .035) 48%, transparent 78%),
          radial-gradient(ellipse 20% 30% at 34% 74%, rgba(232, 194, 170, .12), rgba(232, 194, 170, .025) 48%, transparent 78%);
        animation: jellyfish-bloom 27s ease-in-out infinite alternate;
      }

      main {
        position: relative;
        z-index: 1;
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: 32px;
      }

      .preview {
        width: min(940px, 100%);
      }

      .eyebrow {
        margin: 0 0 18px;
        color: var(--peach);
        font-size: .78rem;
        font-weight: 600;
        letter-spacing: .14em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        color: var(--white);
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3.6rem, 9vw, 7.8rem);
        font-weight: 400;
        letter-spacing: -.055em;
        line-height: .9;
      }

      p {
        max-width: 560px;
        margin: 24px 0 0;
        color: rgba(255, 244, 229, .8);
        font-size: clamp(1rem, 1.6vw, 1.2rem);
      }

      .chip {
        display: inline-flex;
        margin-top: 34px;
        padding: 10px 15px;
        border: 1px solid rgba(243, 222, 199, .26);
        border-radius: 999px;
        background: rgba(255, 244, 229, .1);
        color: var(--white);
        font-size: .78rem;
        letter-spacing: .06em;
        text-transform: uppercase;
        backdrop-filter: blur(14px);
      }

      @keyframes jellyfish-drift {
        0% { transform: translate3d(-3%, -2%, 0) scale(1.03); opacity: .48; }
        55% { transform: translate3d(2%, 3%, 0) scale(1.08); opacity: .62; }
        100% { transform: translate3d(5%, -1%, 0) scale(1.05); opacity: .52; }
      }

      @keyframes jellyfish-bloom {
        0% { transform: translate3d(3%, 2%, 0) scale(1.02); opacity: .34; }
        50% { transform: translate3d(-2%, -3%, 0) scale(1.08); opacity: .48; }
        100% { transform: translate3d(-4%, 2%, 0) scale(1.04); opacity: .38; }
      }

      @media (prefers-reduced-motion: reduce) {
        body::before,
        body::after { animation: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="preview">
        <p class="eyebrow">Acoustic States / motion study</p>
        <h1>Change the state.<br />Change the story.</h1>
        <p>Watch the background for a few seconds: the warm and blue colour fields move almost imperceptibly, like light drifting through water.</p>
        <span class="chip">Subtle jellyfish drift</span>
      </section>
    </main>
  </body>
</html>
